<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  const storageKey = 'm2m-theme';
  const root = document.documentElement;
  const media = window.matchMedia('(prefers-color-scheme: dark)');
  const normalizeTheme = (value) => value === 'dark' || value === 'light' ? value : null;
  const getStoredTheme = () => {
    try {
      return normalizeTheme(window.localStorage.getItem(storageKey));
    } catch {
      return null;
    }
  };
  const getSystemTheme = () => media.matches ? 'dark' : 'light';
  const getPreferredTheme = () => normalizeTheme(params.get('theme')) ?? getStoredTheme() ?? getSystemTheme();

  root.dataset.embedded = params.get('embed') === '1' ? 'true' : 'false';

  window.__m2mApplyTheme = (theme, persist = false) => {
    const nextTheme = normalizeTheme(theme) ?? getPreferredTheme();
    root.dataset.theme = nextTheme;
    root.style.colorScheme = nextTheme;
    if (persist) {
      try {
        window.localStorage.setItem(storageKey, nextTheme);
      } catch {
        // Ignore storage failures.
      }
    }
  };

  window.__m2mApplyTheme(getPreferredTheme(), false);

  const syncSystemTheme = (event) => {
    if (getStoredTheme()) return;
    window.__m2mApplyTheme(event.matches ? 'dark' : 'light', false);
  };

  if (typeof media.addEventListener === 'function') {
    media.addEventListener('change', syncSystemTheme);
  } else if (typeof media.addListener === 'function') {
    media.addListener(syncSystemTheme);
  }
})();
</script>

    --top-line: rgba(34, 211, 238, 0.16);
    --chrome-bg: rgba(8, 15, 28, 0.86);
    --chrome-border: rgba(166, 212, 255, 0.14);
    --chrome-text: #ebf4ff;
    --chrome-muted: rgba(235, 244, 255, 0.72);
    --theme-toggle-shell: rgba(10, 17, 31, 0.92);
    --theme-toggle-border: rgba(166, 212, 255, 0.14);
    --theme-toggle-icon: rgba(235, 244, 255, 0.92);
    --theme-toggle-icon-inactive: rgba(235, 244, 255, 0.52);
    --theme-toggle-thumb: linear-gradient(135deg, #c48cff, #a56cff);
    --theme-toggle-thumb-shadow: 0 10px 22px rgba(165, 108, 255, 0.28);
  }
}

:root[data-theme="dark"] {
  color-scheme: dark;
  --bg-start: #040915;
  --bg-mid: #050b16;
  --bg-end: #02050c;
  --grid-dot: rgba(255, 255, 255, 0.04);
  --divider: rgba(255, 255, 255, 0.05);
  --section-label: rgba(255, 255, 255, 0.20);
  --title-copy: #22d3ee;
  --subtitle-copy: rgba(255, 255, 255, 0.45);
  --footer-copy: rgba(255, 255, 255, 0.28);
  --top-line: rgba(34, 211, 238, 0.16);
  --chrome-bg: rgba(8, 15, 28, 0.86);
  --chrome-border: rgba(166, 212, 255, 0.14);
  --chrome-text: #ebf4ff;
  --chrome-muted: rgba(235, 244, 255, 0.72);
  --theme-toggle-shell: rgba(10, 17, 31, 0.92);
  --theme-toggle-border: rgba(166, 212, 255, 0.14);
  --theme-toggle-icon: rgba(235, 244, 255, 0.92);
  --theme-toggle-icon-inactive: rgba(235, 244, 255, 0.52);
  --theme-toggle-thumb: linear-gradient(135deg, #c48cff, #a56cff);

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.10), transparent 24%),
    linear-gradient(180deg, var(--bg-start) 0%, var(--bg-mid) 48%, var(--bg-end) 100%);
  font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
  color: var(--chrome-text);
  padding: 0;
}
.site-header {
  position: sticky;
  top: 16px;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin: 20px auto 18px;
  padding: 16px 18px;
  width: min(calc(100% - 28px), 1680px);
  background: var(--chrome-bg);
  border: 1px solid var(--chrome-border);
  border-radius: 999px;
  backdrop-filter: blur(18px);
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
  color: inherit;
  text-decoration: none;
}
.brand-mark {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #0a1524;
  background: linear-gradient(135deg, #22d3ee, #f97316);
}
.brand-copy strong,
.brand-copy span {
  display: block;
}
.brand-copy strong {
  font-size: 0.96rem;
}
.brand-copy span {
  color: var(--chrome-muted);
  font-size: 0.78rem;
}
.site-header-actions,
.site-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.site-header-actions {
  gap: 12px;
}
.site-nav .nav-item {
  padding: 10px 14px;
  border-radius: 999px;
  color: var(--chrome-muted);
  transition: 180ms ease;
  text-decoration: none;
}
.site-nav a:hover,
.site-nav a[aria-current="page"] {
  color: var(--chrome-text);
  background: color-mix(in srgb, var(--title-copy) 12%, transparent);
}
.site-nav .is-disabled {
  color: color-mix(in srgb, var(--chrome-muted) 56%, transparent);
  background: color-mix(in srgb, var(--chrome-bg) 58%, transparent);
  border: 1px solid color-mix(in srgb, var(--chrome-border) 55%, transparent);
  cursor: not-allowed;
}
:root[data-embedded="true"] .site-header,
:root[data-embedded="true"] .page-lead {
  display: none;
}
.zoom-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 42px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--chrome-border);
  background: var(--chrome-bg);
  color: var(--chrome-muted);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
  backdrop-filter: blur(16px);
  text-decoration: none;
  font-size: 13px;
}
.zoom-button:hover {
  color: var(--chrome-text);
}
.zoom-button {
  appearance: none;
  cursor: pointer;
  padding: 0;
  width: 42px;
}
.zoom-button.is-reset {
  width: auto;
  padding: 10px 14px;
}
.page {
  width: min(calc(100% - 28px), 1680px);
  margin: 0 auto;
  padding: 6px 0 40px;
  position: relative;
  z-index: 1;
}
.page-lead {
  margin-bottom: 14px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  color: var(--chrome-muted);
  font-size: 0.92rem;
  transition: color 180ms ease, transform 180ms ease;
  text-decoration: none;
}
.back-link:hover {
  color: var(--chrome-text);
  transform: translateX(-1px);
}
.poster-shell {
  width: min(100%, 1200px);
  margin: 0 auto;
}
.poster-tools {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin: 0 0 12px;
}
.theme-toggle {
  appearance: none;
  border: 0;
  background: transparent;
  padding: 0;
  cursor: pointer;
  line-height: 1;
}
.theme-toggle__track {
  position: relative;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  align-items: center;
  gap: 8px;
  width: 92px;
  height: 48px;
  padding: 0 10px;
  border-radius: 999px;
  background: var(--theme-toggle-shell);
  border: 1px solid var(--theme-toggle-border);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
  isolation: isolate;
}
.theme-toggle__icon {
  position: relative;
  z-index: 1;
  display: grid;
  place-items: center;
  color: var(--theme-toggle-icon-inactive);
  transition: color 180ms ease;
}
.theme-toggle__icon svg {
  width: 18px;
  height: 18px;
  display: block;
}
.theme-toggle__thumb {
  position: absolute;
  top: 5px;
  left: 5px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--theme-toggle-thumb);
  box-shadow: var(--theme-toggle-thumb-shadow);
  transition: transform 220ms ease, background 180ms ease, box-shadow 180ms ease;
}
.theme-toggle[data-theme="light"] .theme-toggle__thumb { transform: translateX(0); }
.theme-toggle[data-theme="dark"] .theme-toggle__thumb { transform: translateX(44px); }
.theme-toggle[data-theme="light"] .theme-toggle__icon--sun,
.theme-toggle[data-theme="dark"] .theme-toggle__icon--moon { color: var(--theme-toggle-icon); }
.theme-toggle:focus-visible .theme-toggle__track {
  outline: 2px solid #22d3ee;
  outline-offset: 3px;
}
.poster {
  position: relative;
  width: 100%;
  aspect-ratio: 1200 / 680;
  overflow: hidden;
  border-radius: 22px;
  box-shadow: 0 24px 90px rgba(0, 0, 0, 0.42);
}
:root[data-embedded="true"] .poster {
  width: 100%;
  height: calc(100vh - 60px);
  aspect-ratio: auto;
  border-radius: 0;
  box-shadow: none;
}
:root[data-embedded="true"] .page {
  width: 100%;
  padding: 0;
}
:root[data-embedded="true"] .poster-shell {
  width: 100%;
}
:root[data-embedded="true"] .poster-tools {
  margin: 0;
  padding: 10px 12px 8px;
}
svg { display: block; width: 100%; height: 100%; }
#stage-svg {
  cursor: grab;
  touch-action: none;
}
#stage-svg.is-panning {
  cursor: grabbing;
}

.node-g {
  opacity: 0;
  transform: scale(0.88) translateY(10px);
  transform-box: fill-box;
  transform-origin: center;
  transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.16, 1, 0.3, 1), filter 200ms ease;
}
.node-g.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.edge-g {
  opacity: 0;
  transition: opacity 0.4s ease;
}
.edge-g.show {
  opacity: 1;
}
.node-g.route-muted {
  opacity: 0.18;
  filter: saturate(0.8);
}
.edge-g.route-muted {
  opacity: 0.12;
}
.node-g.route-highlight {
  opacity: 1;
  filter: url(#activeGlow);
}
.edge-g.route-highlight {
  opacity: 1;
}
.edge-g.route-highlight use {
  stroke-width: 3;
}
.edge-g.route-highlight circle,
.edge-g.route-highlight polygon {
  opacity: 1;
}

@keyframes haloPulse {
  0%, 100% { opacity: 0.16; }
  50% { opacity: 0.32; }
}

@keyframes titleGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.45)); }
  50% { filter: drop-shadow(0 0 18px rgba(34, 211, 238, 0.85)); }
}

@keyframes pulseDot {
  0% { r: 4; opacity: 0.88; }
  100% { r: 14; opacity: 0; }
}

.halo { animation: haloPulse 4s ease-in-out infinite; }
.title-glow { animation: titleGlow 3s ease-in-out infinite; }
.pulse-dot { animation: pulseDot 2s ease-out infinite; }
.pulse-dot.delayed { animation-delay: 0.7s; }

@media (max-width: 720px) {
  .site-header,
  .page {
    width: min(calc(100% - 18px), 1680px);
  }

  .site-header {
    position: static;
    flex-direction: column;
    align-items: stretch;
    border-radius: 28px;
  }

  .site-header-actions,
  .site-nav {
    justify-content: space-between;
  }

  .poster-tools {
    justify-content: flex-start;
    flex-wrap: wrap;
  }
}
</style>

<script>
const svg = document.getElementById('stage-svg');
const scene = document.getElementById('scene');
const nodes = ['n0', 'n1', 'n2', 'n3', 'n4', 'n5', 'n6', 'n7', 'n8', 'n9', 'n10', 'n11', 'n12', 'n13'];
const edges = ['e0', 'e1', 'e2', 'e3', 'e4', 'e5', 'e6', 'e7', 'e8', 'e9', 'e10', 'e11', 'e12'];
const focusGroups = {
  all: {
    nodes,
    edges
  },
  router: {
    nodes: ['n6', 'n10', 'n11', 'n12', 'n13'],
    edges: ['e5', 'e9', 'e10', 'e11', 'e12']
  },
  private: {
    nodes: ['n6', 'n10', 'n12'],
    edges: ['e5', 'e9', 'e10']
  },
  public: {
    nodes: ['n6', 'n11', 'n13'],
    edges: ['e5', 'e11', 'e12']
  }
};
const zoomState = {
  scale: 1,
  x: 0,
  y: 0,
  minScale: 0.75,
  maxScale: 2.5
};
const panState = {
  active: false,
  pointerId: null,
  startX: 0,
  startY: 0,
  originX: 0,
  originY: 0
};

function syncThemeToggle() {
  const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
  document.querySelectorAll('[data-theme-toggle]').forEach((toggle) => {
    toggle.dataset.theme = theme;
    toggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
    const label = theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
    toggle.setAttribute('aria-label', label);
    toggle.setAttribute('title', label);
  });
}

function normalizeFocus(mode) {
  return ['all', 'router', 'private', 'public'].includes(mode) ? mode : 'router';
}

function applyTransform() {
  scene.setAttribute(
    'transform',
    `matrix(${zoomState.scale} 0 0 ${zoomState.scale} ${zoomState.x} ${zoomState.y})`
  );
  svg.classList.toggle('is-panning', panState.active);
}

function clampScale(value) {
  return Math.min(zoomState.maxScale, Math.max(zoomState.minScale, value));
}

function getSvgPoint(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  const viewBox = svg.viewBox.baseVal;
  return {
    x: viewBox.x + ((clientX - rect.left) / rect.width) * viewBox.width,
    y: viewBox.y + ((clientY - rect.top) / rect.height) * viewBox.height
  };
}

function zoomAt(clientX, clientY, factor) {
  const point = getSvgPoint(clientX, clientY);
  const previousScale = zoomState.scale;
  const nextScale = clampScale(previousScale * factor);

  if (nextScale === previousScale) return;

  const ratio = nextScale / previousScale;
  zoomState.x = point.x - (point.x - zoomState.x) * ratio;
  zoomState.y = point.y - (point.y - zoomState.y) * ratio;
  zoomState.scale = nextScale;

  if (Math.abs(zoomState.scale - 1) < 0.001) {
    zoomState.scale = 1;
    zoomState.x = 0;
    zoomState.y = 0;
  }

  applyTransform();
}

function zoomByStep(direction) {
  const rect = svg.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  zoomAt(centerX, centerY, direction > 0 ? 1.14 : 1 / 1.14);
}

function resetView() {
  zoomState.scale = 1;
  zoomState.x = 0;
  zoomState.y = 0;
  panState.active = false;
  panState.pointerId = null;
  applyTransform();
}

function setEdgeMotion(edgeId, state) {
  const edge = document.getElementById(edgeId);
  if (!edge) return;

  edge.querySelectorAll('animateMotion').forEach((animation) => {
    const raw = animation.dataset.baseDur || animation.getAttribute('dur') || '1s';

    if (!animation.dataset.baseDur) {
      animation.dataset.baseDur = raw;
    }

    const base = Number.parseFloat(raw);
    const next = state === 'highlight'
      ? base * 0.82
      : state === 'muted'
        ? base * 1.12
        : base;

    animation.setAttribute('dur', `${Math.max(next, 0.35).toFixed(2).replace(/\.00$/, '')}s`);
  });
}

function applyFocus(mode = 'router') {
  const focusMode = normalizeFocus(mode);
  const group = focusGroups[focusMode];
  const highlightedNodes = new Set(group.nodes);
  const highlightedEdges = new Set(group.edges);
  const useMutedState = focusMode !== 'all';

  nodes.forEach((id) => {
    const element = document.getElementById(id);
    if (!element) return;
    const isHighlighted = highlightedNodes.has(id);
    element.classList.toggle('route-highlight', isHighlighted);
    element.classList.toggle('route-muted', useMutedState && !isHighlighted);
  });

  edges.forEach((id) => {
    const element = document.getElementById(id);
    if (!element) return;
    const isHighlighted = highlightedEdges.has(id);
    element.classList.toggle('route-highlight', isHighlighted);
    element.classList.toggle('route-muted', useMutedState && !isHighlighted);
    setEdgeMotion(id, isHighlighted ? 'highlight' : useMutedState ? 'muted' : 'normal');
  });
}

function stopPan() {
  if (panState.pointerId !== null && typeof svg.releasePointerCapture === 'function') {
    try {
      svg.releasePointerCapture(panState.pointerId);
    } catch {
      // Ignore pointer capture cleanup issues.
    }
  }

  panState.active = false;
  panState.pointerId = null;
  applyTransform();
}

window.addEventListener('message', (event) => {
  if (event.origin !== window.location.origin) return;

  if (event.data?.type === 'm2m:set-theme') {
    window.__m2mApplyTheme?.(event.data.theme, false);
    syncThemeToggle();
  }

  if (event.data?.type === 'm2m:set-focus') {
    applyFocus(event.data.focus);
  }
});

document.querySelectorAll('[data-theme-toggle]').forEach((toggle) => {
  toggle.addEventListener('click', () => {
    const nextTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    window.__m2mApplyTheme?.(nextTheme, true);
    syncThemeToggle();
  });
});

const zoomOutButton = document.querySelector('[data-zoom="out"]');
if (zoomOutButton) {
  zoomOutButton.textContent = '-';
}

document.querySelectorAll('[data-zoom]').forEach((button) => {
  button.addEventListener('click', () => {
    const action = button.getAttribute('data-zoom');
    if (action === 'in') zoomByStep(1);
    if (action === 'out') zoomByStep(-1);
    if (action === 'reset') resetView();
  });
});

svg.addEventListener('wheel', (event) => {
  event.preventDefault();
  zoomAt(event.clientX, event.clientY, event.deltaY < 0 ? 1.12 : 1 / 1.12);
}, { passive: false });

svg.addEventListener('pointerdown', (event) => {
  if (event.button !== 0 || zoomState.scale <= 1.001) return;

  const point = getSvgPoint(event.clientX, event.clientY);
  panState.active = true;
  panState.pointerId = event.pointerId;
  panState.startX = point.x;
  panState.startY = point.y;
  panState.originX = zoomState.x;
  panState.originY = zoomState.y;

  if (typeof svg.setPointerCapture === 'function') {
    svg.setPointerCapture(event.pointerId);
  }

  applyTransform();
});

svg.addEventListener('pointermove', (event) => {
  if (!panState.active || event.pointerId !== panState.pointerId) return;

  const point = getSvgPoint(event.clientX, event.clientY);
  zoomState.x = panState.originX + (point.x - panState.startX);
  zoomState.y = panState.originY + (point.y - panState.startY);
  applyTransform();
});

svg.addEventListener('pointerup', stopPan);
svg.addEventListener('pointercancel', stopPan);
svg.addEventListener('lostpointercapture', stopPan);

syncThemeToggle();
applyTransform();
applyFocus('router');

nodes.forEach((id, index) => {
  setTimeout(() => {
    const element = document.getElementById(id);
    if (element) element.classList.add('show');
  }, 120 + index * 130);
});

edges.forEach((id, index) => {
  setTimeout(() => {
    const element = document.getElementById(id);
    if (element) element.classList.add('show');
  }, 200 + index * 110);
});
</script>
</body>
