<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.10), transparent 24%),
    linear-gradient(180deg, #040915 0%, #050b16 48%, #02050c 100%);
  font-family: 'DM Sans', sans-serif;
}
.poster {
  width: 1200px;
  height: 680px;
  overflow: hidden;
  border-radius: 22px;
  box-shadow: 0 24px 90px rgba(0, 0, 0, 0.42);
}
svg { display: block; width: 100%; height: 100%; }

.node-g {
  opacity: 0;
  transform: scale(0.88) translateY(10px);
  transform-box: fill-box;
  transform-origin: center;
  transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
}
.node-g.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.edge-g {
  opacity: 0;
  transition: opacity 0.4s ease;
}
.edge-g.show {
  opacity: 1;
}

@keyframes haloPulse {
  0%, 100% { opacity: 0.16; }
  50% { opacity: 0.32; }
}

@keyframes titleGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.45)); }
  50% { filter: drop-shadow(0 0 18px rgba(34, 211, 238, 0.85)); }
}

@keyframes pulseDot {
  0% { r: 4; opacity: 0.88; }
  100% { r: 14; opacity: 0; }
}

.halo { animation: haloPulse 4s ease-in-out infinite; }
.title-glow { animation: titleGlow 3s ease-in-out infinite; }
.pulse-dot { animation: pulseDot 2s ease-out infinite; }
.pulse-dot.delayed { animation-delay: 0.7s; }
</style>
</head>
